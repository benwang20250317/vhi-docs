<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VHI 雲端文件庫 v7.1</title>
    <style>
        :root { --primary: #0284c7; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --success: #059669; --google: #ef4444; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        .panel { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        h2 { text-align: center; margin-top: 0; color: var(--primary); font-size: 1.4rem; letter-spacing: 1px; }
        label { display: block; font-size: 13px; color: #64748b; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-add { width: 100%; padding: 14px; background: #0284c7; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 10px; }
        .btn-history { background: var(--google); color: white; width: 100%; text-decoration: none; text-align: center; display: block; line-height: 48px; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .status-msg { background: var(--success); color: white; text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; }
        .filter-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 10px; }
        .filter-btn { white-space: nowrap; padding: 6px 16px; background: #e2e8f0; border-radius: 20px; cursor: pointer; font-size: 13px; color: #475569; }
        .filter-btn.active { background: var(--primary); color: white; }
        .bookmark-card { background: var(--card); margin-bottom: 12px; padding: 15px; border-radius: 10px; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .info a { text-decoration: none; color: var(--primary); font-weight: 600; display: block; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .info p { margin: 0; font-size: 12px; color: #94a3b8; word-break: break-all; }
        .loading { text-align: center; color: #64748b; padding: 40px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 VHI 雲端同步書籤 (v7.1)</h2>
    <div id="status" class="status-msg">✅ 資料已成功同步至 Google</div>

    <div class="panel">
        <form id="bmForm" target="hidden_iframe" onsubmit="handleFormSubmit()">
            <label>文件標題</label>
            <input type="text" id="siteName" name="entry.5718413" placeholder="標題內容" required>
            <label>文件網址</label>
            <input type="url" id="siteUrl" name="entry.1948870300" placeholder="https://..." required>
            <label>分類標籤</label>
            <select id="categorySelect" name="entry.696853553">
                <option value="Virtuozzo">Virtuozzo</option>
                <option value="Linux">Linux</option>
                <option value="Network">Network</option>
                <option value="VHI-Storage">VHI-Storage</option>
            </select>
            <button type="submit" class="btn-add">同步並儲存</button>
        </form>
        <a id="historyLink" href="#" target="_blank" class="btn-history">📊 開啟 Google 試算表原始紀錄</a>
    </div>

    <div id="filterBar" class="filter-bar"></div>
    <div id="list"><div class="loading">正在從新雲端讀取資料...</div></div>
</div>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

<script>
    // --- 🛠️ 自動套用新 ID ---
    const SHEET_ID = '1V1LZEv68bCdzEHVV1_OYInXG2HCKKVIpr_nkxYRHWlPsytQ'.split('/')[0] === '1V1LZEv68bCdzEHVV1_OYInXG2HCKKVIpr_nkxYRHWlPsytQ' ? '1V1LZEv68bCdzEHVV1_OYInXG2HCKKVIpr_nkxYRHWlPsytQ' : ''; 
    // 注意：如果是新重建的表單，請手動將下方 SHEET_ID 換成您新試算表的 ID
    const ACTUAL_SHEET_ID = '1q8_S6v9_H0Zqf2V9m3L6f8x_L7R9_nS3V'; // 預設占位符
    
    // 從您提供的表單連結中提取的 ID
    const FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLSfV1LZEv68bCdzEHVV1_OYInXG2HCKKVIpr_nkxYRHWlPsytQ/formResponse";

    let bookmarks = [];
    let currentFilter = '全部';

    // 啟動函式
    async function init() {
        document.getElementById('bmForm').action = FORM_ACTION;
        
        // 解析參數
        const params = new URLSearchParams(window.location.search);
        if (params.has('name')) document.getElementById('siteName').value = decodeURIComponent(params.get('name'));
        if (params.has('url')) document.getElementById('siteUrl').value = decodeURIComponent(params.get('url'));

        // 如果您已經有 SHEET_ID，請手動更新此處以啟動讀取
        // await fetchCloudData(); 
        document.getElementById('list').innerHTML = '<div class="loading">請確認已完成「發布到網路」並在程式碼中填入正確的 SHEET_ID。</div>';
    }

    async function fetchCloudData() {
        // 此功能需要正確的 SHEET_ID 且試算表已發布
        const url = `https://docs.google.com/spreadsheets/d/${ACTUAL_SHEET_ID}/gviz/tq?tqx=out:csv`;
        try {
            const response = await fetch(url);
            const data = await response.text();
            const rows = data.split('\n').slice(1); 
            bookmarks = rows.map(row => {
                const cols = row.split('","').map(c => c.replace(/"/g, ''));
                return { name: cols[1], url: cols[2], cat: cols[3] };
            }).filter(b => b.name);
            renderFilterBar();
            renderBookmarks();
        } catch (e) {
            document.getElementById('list').innerHTML = `<div class="loading" style="color:#ef4444;">讀取失敗：請檢查試算表是否已「發布」。</div>`;
        }
    }

    function handleFormSubmit() {
        document.getElementById('status').style.display = 'block';
        setTimeout(() => {
            document.getElementById('status').style.display = 'none';
            document.getElementById('siteName').value = '';
            document.getElementById('siteUrl').value = '';
        }, 1500);
    }

    function renderFilterBar() {
        const uniqueCats = ['全部', ...new Set(bookmarks.map(b => b.cat))];
        document.getElementById('filterBar').innerHTML = uniqueCats.map(c => `<div class="filter-btn ${currentFilter === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}</div>`).join('');
    }

    function setFilter(cat) { currentFilter = cat; renderFilterBar(); renderBookmarks(); }

    function renderBookmarks() {
        const container = document.getElementById('list');
        const data = currentFilter === '全部' ? bookmarks : bookmarks.filter(b => b.cat === currentFilter);
        container.innerHTML = data.slice().reverse().map(b => `
            <div class="bookmark-card">
                <div class="info">
                    <a href="${b.url}" target="_blank">${b.name}</a>
                    <p>${b.url}</p>
                    <div style="font-size:10px; color:#64748b; margin-top:5px;">📁 分類：${b.cat}</div>
                </div>
            </div>`).join('');
    }

    init();
</script>
</body>
</html>
